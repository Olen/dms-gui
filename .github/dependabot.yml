version: 2

# Dependabot opens PRs against `main` (the primary branch).
# `upstream-snapshot` preserves the original fork point and must
# never receive automated commits.
#
# Grouping strategy: minor + patch updates are collapsed per
# ecosystem-directory into one PR per dependency-type. Major bumps
# fall out of the group and arrive as individual PRs so each one
# still gets its own review. This keeps PR churn low without losing
# review granularity where it actually matters (breaking changes).
#
# The 5-PR limit per ecosystem-directory is preserved as a safety
# rail. With grouping, hitting it now means real work (groups + a
# stack of individual major bumps), not background noise from
# routine patch updates.

updates:
  # Root npm — devDependencies only (eslint, husky, lint-staged, prettier).
  #
  # eslint 10 is held back until eslint-plugin-react widens its
  # peerDependency range. Today (eslint-plugin-react@7.37.5) the
  # range is "^3 || ^4 || ^5 || ^6 || ^7 || ^8 || ^9.7" — installing
  # eslint 10 fails with ERESOLVE. Upstream merged the prep work in
  # https://github.com/jsx-eslint/eslint-plugin-react/pull/4006
  # (2026-05-13); a release widening the peer range should follow.
  # When eslint-plugin-react publishes that release: remove this
  # ignore block, let Dependabot reopen the bump, and verify
  # `npm install` and `npm run lint` both pass.
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    groups:
      development-deps:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/backend"
    target-branch: "main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(backend)"
    labels:
      - "dependencies"
      - "backend"
    groups:
      production-deps:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-deps:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/frontend"
    target-branch: "main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(frontend)"
    labels:
      - "dependencies"
      - "frontend"
    groups:
      production-deps:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-deps:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions in .github/workflows — catches the Node 20 → 24
  # action upgrades (actions/checkout, docker/*-action, etc.) once
  # those upstream actions release Node-24-compatible versions.
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(ci)"
    labels:
      - "dependencies"
      - "ci"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Dockerfile base image (currently node:24.14.0-alpine).
  #
  # We ignore major bumps for `node` so Dependabot only proposes
  # patch/minor updates within the current LTS line (24.x → 24.x).
  # Node's release cadence puts every odd major on the "Current"
  # track (never LTS) and only promotes an even major to LTS roughly
  # six months after release — production should not auto-track those.
  # When the next even major becomes LTS, bump `node-version` in
  # .github/workflows/{test,release}.yml + the `FROM` lines + the
  # OCI label on Dockerfile:95 together in one commit and let
  # Dependabot resume minor tracking on the new line.
  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(docker)"
    labels:
      - "dependencies"
      - "docker"
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
