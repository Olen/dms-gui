version: 2

# Dependabot opens PRs against `main` (the primary branch).
# `upstream-snapshot` preserves the original fork point and must
# never receive automated commits.

updates:
  # Root npm — devDependencies (eslint, husky, lint-staged)
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/backend"
    target-branch: "main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(backend)"
    labels:
      - "dependencies"
      - "backend"

  - package-ecosystem: "npm"
    directory: "/frontend"
    target-branch: "main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(frontend)"
    labels:
      - "dependencies"
      - "frontend"

  # GitHub Actions in .github/workflows — catches the Node 20 → 24
  # action upgrades (actions/checkout, docker/*-action, etc.) once
  # those upstream actions release Node-24-compatible versions.
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(ci)"
    labels:
      - "dependencies"
      - "ci"

  # Dockerfile base image (currently node:24.14.0-alpine).
  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(docker)"
    labels:
      - "dependencies"
      - "docker"
